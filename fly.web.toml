app = "tinker-web"
primary_region = "ord"

[build]
  dockerfile = "apps/web/Dockerfile"
  build_target = "runner"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 500
    soft_limit = 300

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
